name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linter
        run: pip install flake8

      - name: Lint app code
        run: |
          flake8 real_estate_app/app.py real_estate_app/pages/ \
            --max-line-length=120 \
            --ignore=E501,W503,W504,E221,E241,E302,E303,E305,E701,E272,E127,E225 \
            --exclude=__pycache__

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./real_estate_app
          push: false
          tags: gurgaon-property-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image built
        run: docker images gurgaon-property-app
